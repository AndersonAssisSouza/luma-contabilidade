        }

        function renderAccountsTree() {
            const tbody = document.getElementById('accountsTableBody');
            const filterTipo = document.getElementById('filterTipo').value;
            const filterDescricao = document.getElementById('filterDescricao').value.toLowerCase();

            tbody.innerHTML = '';

            const filteredAccounts = accounts.filter(acc => {
                const matchTipo = !filterTipo || acc.tipo === filterTipo;
                const matchDesc = !filterDescricao || acc.descricao.toLowerCase().includes(filterDescricao);
                return matchTipo && matchDesc;
            });

            filteredAccounts.forEach(account => {
                const children = accounts.filter(a => a.conta_pai_id === account.id);
                const hasChildren = children.length > 0;

                const tr = document.createElement('tr');
                tr.id = `account-row-${account.id}`;
                tr.className = `level-${account.nivel}`;

                const typeClass = `tipo-${account.tipo.toLowerCase()}`;
                const statusClass = account.status === 'ativo' ? 'status-ativo' : 'status-inativo';

                let toggleHtml = '';
                if (hasChildren) {
                    const isExpanded = expandedRows.has(account.id);
                    toggleHtml = `<div class="tree-toggle" onclick="toggleExpand(${account.id})">${isExpanded ? '▼' : '▶'}</div>`;
                } else {
                    toggleHtml = '<div class="tree-toggle empty"></div>';
                }

                tr.innerHTML = `
                    <td>
                        <div class="tree-row">
                            ${toggleHtml}
                            <span class="account-code">${account.codigo}</span>
                        </div>
                    </td>
                    <td>
                        <div class="account-descricao">${account.descricao}</div>
                    </td>
                    <td>
                        <span class="account-tipo ${typeClass}">${account.tipo}</span>
                    </td>
                    <td>${account.natureza}</td>
                    <td>${account.nivel}</td>
                    <td>${account.aceita_lancamento ? '✓ Sim' : 'Não'}</td>
                    <td><span class="${statusClass}">${account.status === 'ativo' ? 'Ativo' : 'Inativo'}</span></td>
                    <td class="row-actions">
                        <button class="btn btn-small btn-secondary" onclick="openEditAccountModal(${account.id})">Editar</button>
                    </td>
                `;

                tbody.appendChild(tr);

                // Render children if expanded
                if (hasChildren && expandedRows.has(account.id)) {
                             children.forEach(child => renderChildRow(child, tbody));
                }
            });
        }

        function renderChildRow(account, tbody) {
            const children = accounts.filter(a => a.conta_pai_id === account.id);
            const hasChildren = children.length > 0;

            const tr = document.createElement('tr');
            tr.id = `account-row-${account.id}`;
            tr.className = `level-${account.nivel}`;

            const typeClass = `tipo-${account.tipo.toLowerCase()}`;
            const statusClass = account.status === 'ativo' ? 'status-ativo' : 'status-inativo';

            let toggleHtml = '';
            if (hasChildren) {
                const isExpanded = expandedRows.has(account.id);
                toggleHtml = `<div class="tree-toggle" onclick="toggleExpand(${account.id})">${isExpanded ? '▼' : '▶'}</div>`;
            } else {
                toggleHtml = '<div class="tree-toggle empty"></div>';
            }

            tr.innerHTML = `
                <td>
                    <div class="tree-row">
                        ${toggleHtml}
                        <span class="account-code">${account.codigo}</span>
                    </div>
                </td>
                <td>
                    <div class="account-descricao">${account.descricao}</div>
                </td>
                <td>
                    <span class="account-tipo ${typeClass}">${account.tipo}</span>
                </td>
                <td>${account.natureza}</td>
                <td>${account.nivel}</td>
                <td>${account.aceita_lancamento ? '✓ Sim' : 'Não'}</td>
                <td><span class="${statusClass}">${account.status === 'ativo' ? 'Ativo' : 'Inativo'}</span></td>
                <td class="row-actions">
                    <button class="btn btn-small btn-secondary" onclick="openEditAccountModal(${account.id})">Editar</button>
                </td>
            `;

            tbody.appendChild(tr);

            // Recursively render children
            if (hasChildren && expandedRows.has(account.id)) {
                children.forEach(child => renderChildRow(child, tbody));
            }
        }

        function toggleExpand(accountId) {
            if (expandedRows.has(accountId)) {
                expandedRows.delete(accountId);
            } else {
                expandedRows.add(accountId);
            }
            renderAccountsTree();
        }

        function loadParentAccounts() {
            const select = document.getElementById('accountContaPai');
            select.innerHTML = '<option value="">Nenhuma (Conta Raiz)</option>';

            accounts
                .filter(a => a.aceita_lancamento === false)
                .forEach(account => {
                    const option = document.createElement('option');
                    option.value = account.id;
                    option.textContent = `${account.codigo} - ${account.descricao}`;
                    select.appendChild(option);
                });
        }

        function openAddAccountModal() {
            currentEditId = null;
            document.getElementById('modalTitle').textContent = 'Nova Conta';
            document.getElementById('accountCodigo').value = '';
            document.getElementById('accountDescricao').value = '';
            document.getElementById('accountTipo').value = '';
            document.getElementById('accountNivel').value = '';
            document.getElementById('accountContaPai').value = '';
            document.getElementById('accountAceitaLancamento').checked = true;
            updateNatureza();

            document.getElementById('accountModal').classList.add('active');
        }

        function openEditAccountModal(id) {
            const account = accounts.find(a => a.id === id);
            if (!account) return;

            currentEditId = id;
            document.getElementById('modalTitle').textContent = 'Editar Conta';
            document.getElementById('accountCodigo').value = account.codigo;
            document.getElementById('accountDescricao').value = account.descricao;
            document.getElementById('accountTipo').value = account.tipo;
            document.getElementById('accountNivel').value = account.nivel;
            document.getElementById('accountContaPai').value = account.conta_pai_id || '';
            document.getElementById('accountAceitaLancamento').checked = account.aceita_lancamento;
            updateNatureza();

            document.getElementById('accountModal').classList.add('active');
        }

        function closeAccountModal() {
            document.getElementById('accountModal').classList.remove('active');
        }

        function updateNatureza() {
            const tipo = document.getElementById('accountTipo').value;
            const naturezaSelect = document.getElementById('accountNatureza');

            if (!tipo) {
                naturezaSelect.disabled = true;
                return;
            }

            naturezaSelect.disabled = false;

            if (tipo === 'ATIVO' || tipo === 'DESPESA') {
                naturezaSelect.value = 'DEVEDORA';
            } else {
                naturezaSelect.value = 'CREDORA';
            }
        }

        async function saveAccount(event) {
            event.preventDefault();

            const codigo = document.getElementById('accountCodigo').value;
            const descricao = document.getElementById('accountDescricao').value;
            const tipo = document.getElementById('accountTipo').value;
            const natureza = document.getElementById('accountNatureza').value;
            const nivel = document.getElementById('accountNivel').value;
            const conta_pai_id = document.getElementById('accountContaPai').value || null;
            const aceita_lancamento = document.getElementById('accountAceitaLancamento').checked;

            if (currentEditId) {
                // Edit existing
                const account = accounts.find(a => a.id === currentEditId);
                if (account) {
                    account.codigo = codigo;
                    account.descricao = descricao;
                    account.tipo = tipo;
                    account.natureza = natureza;
                    account.nivel = nivel;
                    account.conta_pai_id = conta_pai_id ? parseInt(conta_pai_id) : null;
                    account.aceita_lancamento = aceita_lancamento;
                }
                showMessage('Conta atualizada com sucesso!', 'success');
            } else {
                // Create new
                const newAccount = {
                    id: Math.max(...accounts.map(a => a.id), 0) + 1,
                    codigo,
                    descricao,
                    tipo,
                    natureza,
                    nivel: parseInt(nivel),
                    conta_pai_id: conta_pai_id ? parseInt(conta_pai_id) : null,
                    aceita_lancamento,
                    status: 'ativo'
                };
                accounts.push(newAccount);
                showMessage('Conta criada com sucesso!', 'success');
            }

            closeAccountModal();
            renderAccountsTree();
            loadParentAccounts();
        }

        function showMessage(message, type) {
            const container = document.getElementById('messageContainer');
            const div = document.createElement('div');
            div.className = type === 'error' ? 'error-message' : 'success-message';
            div.textContent = message;
            container.innerHTML = '';
            container.appendChild(div);
            setTimeout(() => div.remove(), 5000);
        }

        document.getElementById('filterTipo').addEventListener('change', renderAccountsTree);
        document.getElementById('filterDescricao').addEventListener('input', renderAccountsTree);

        window.addEventListener('load', initPage);
    </script>
</body>
</html>
